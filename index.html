<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#c0392b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Carteria 2026">
<title>Festa della Carteria 2026</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --rosso: #c0392b;
  --verde: #1a7a4a;
  --verde-chiaro: #e8f5ee;
  --oro: #c9902a;
  --oro-chiaro: #fdf3e0;
  --bg: #f5f3ef;
  --card: #ffffff;
  --testo: #2c2c2c;
  --muted: #7a7570;
  --bordo: #e0dbd3;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--testo); min-height: 100vh; padding-bottom: calc(1rem + var(--safe-bottom)); }

/* HEADER */
header {
  background: var(--rosso);
  color: white;
  padding: calc(1rem + var(--safe-top)) 1rem 1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
  position: sticky;
  top: 0;
  z-index: 100;
}
header h1 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; font-weight: 400; line-height: 1.1; }
header h1 span { display: block; font-family: 'DM Sans', sans-serif; font-size: 0.65rem; font-weight: 300; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.8; }
.header-right { text-align: right; font-size: 0.7rem; opacity: 0.85; line-height: 1.5; flex-shrink: 0; }
.btn-refresh {
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.4);
  border-radius: 50%;
  color: white; cursor: pointer;
  margin-top: 4px; margin-left: auto;
  flex-shrink: 0;
}
.btn-refresh.loading svg { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* MAIN */
main { padding: 0.75rem; max-width: 600px; margin: 0 auto; }

/* NOTA */
.nota {
  background: var(--oro-chiaro);
  border-left: 3px solid var(--oro);
  border-radius: 6px;
  padding: 0.6rem 0.75rem;
  font-size: 0.75rem;
  color: #6b4c10;
  margin-bottom: 0.75rem;
  line-height: 1.4;
}

/* SEZIONE TITOLO */
.sez {
  font-size: 0.65rem; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); margin: 1rem 0 0.5rem;
  display: flex; align-items: center; gap: 8px;
}
.sez::after { content: ''; flex: 1; height: 1px; background: var(--bordo); }

/* KPI GRID — 2 colonne su mobile */
.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 0.25rem; }
.kpi {
  background: var(--card);
  border: 1px solid var(--bordo);
  border-radius: 10px;
  padding: 0.85rem 0.9rem;
}
.kpi.wide { grid-column: 1 / -1; }
.kpi.highlight { border-color: var(--verde); background: var(--verde-chiaro); }
.kpi-label { font-size: 0.68rem; color: var(--muted); margin-bottom: 4px; font-weight: 500; line-height: 1.3; }
.kpi-value { font-family: 'DM Serif Display', serif; font-size: 1.6rem; line-height: 1; margin-bottom: 3px; }
.kpi-diff { font-size: 0.7rem; font-weight: 500; }
.pos { color: var(--verde); } .neg { color: var(--rosso); } .neu { color: var(--muted); }

/* GRAFICI */
.chart-card {
  background: var(--card);
  border: 1px solid var(--bordo);
  border-radius: 10px;
  padding: 0.9rem;
  margin-bottom: 0.75rem;
}
.legend { display: flex; gap: 12px; font-size: 0.68rem; color: var(--muted); margin-bottom: 8px; }
.legend span { display: flex; align-items: center; gap: 4px; }
.ldot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; }

/* TABELLA — collassabile */
.tabella-toggle {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--bordo);
  border-radius: 10px;
  padding: 0.85rem 1rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--testo);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0;
}
.tabella-toggle .arrow { transition: transform 0.2s; font-size: 0.7rem; }
.tabella-toggle.open .arrow { transform: rotate(180deg); }
.tabella-wrap {
  display: none;
  background: var(--card);
  border: 1px solid var(--bordo);
  border-top: none;
  border-radius: 0 0 10px 10px;
  overflow-x: auto;
  margin-bottom: 0.75rem;
}
.tabella-wrap.open { display: block; }
table { width: 100%; border-collapse: collapse; font-size: 0.72rem; }
th { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); text-align: right; padding: 6px 8px; border-bottom: 1px solid var(--bordo); white-space: nowrap; }
th:first-child { text-align: left; }
td { padding: 7px 8px; text-align: right; border-bottom: 1px solid var(--bordo); font-variant-numeric: tabular-nums; white-space: nowrap; }
td:first-child { text-align: left; font-weight: 500; }
tr:last-child td { border-bottom: none; }
tr.tot td { font-weight: 600; background: var(--bg); border-top: 2px solid var(--bordo); }
.dp { color: var(--verde); font-weight: 500; }
.dn { color: var(--rosso); font-weight: 500; }
.chiusi-r { color: var(--bordo); font-style: italic; text-align: center; }

.error-msg { background: #fdecea; border: 1px solid #f5c6c3; border-radius: 8px; padding: 0.9rem; color: #a0281e; font-size: 0.8rem; }
footer { text-align: center; font-size: 0.68rem; color: var(--muted); padding: 1.5rem 1rem; }

/* INSTALL BANNER */
#install-banner {
  display: none;
  background: var(--rosso);
  color: white;
  padding: 0.75rem 1rem;
  font-size: 0.8rem;
  align-items: center;
  gap: 0.75rem;
  justify-content: space-between;
}
#install-banner button {
  background: white;
  color: var(--rosso);
  border: none;
  border-radius: 20px;
  padding: 5px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
</style>
</head>
<body>

<div id="install-banner">
  <span>📲 Aggiungi alla schermata Home</span>
  <button id="btn-install">Installa</button>
</div>

<header>
  <div>
    <h1><span>Festa della</span>Carteria 2026</h1>
    <div id="giorni-count" style="font-size:0.65rem;opacity:0.75;margin-top:2px;"></div>
  </div>
  <div class="header-right">
    <div>⏱ <span id="last-update">—</span></div>
    <button class="btn-refresh" id="btnRefresh" onclick="caricaDati()" aria-label="Aggiorna">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    </button>
  </div>
</header>

<main>
  <div id="contenuto">
    <div style="text-align:center;padding:3rem;color:var(--muted);">
      <div style="font-size:2rem;margin-bottom:0.5rem;">⏳</div>
      <div style="font-size:0.9rem;">Caricamento dati...</div>
    </div>
  </div>
</main>

<footer>Cruscotto Festa della Carteria · Dati live da Google Sheets</footer>

<script>
// PWA: Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// PWA: Install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});
document.getElementById('btn-install').addEventListener('click', () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('install-banner').style.display = 'none';
    });
  }
});

const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRxvPw7GkLWP0FxkBID3tHQe1acQ94dxCM27OAuq0br29_P39VNF9GqsuUZbt3R7hFmycPk1G4Urv9H/pub?gid=2124551819&single=true&output=csv';
let charts = [];

function parseCSV(text) {
  const rows = [];
  const lines = text.split(/\r?\n/);
  for (const line of lines) {
    const row = []; let inQ = false, cell = '';
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { if (inQ && line[i+1] === '"') { cell += '"'; i++; } else inQ = !inQ; }
      else if (c === ',' && !inQ) { row.push(cell); cell = ''; }
      else { cell += c; }
    }
    row.push(cell); rows.push(row);
  }
  return rows;
}

function num(v) {
  if (!v) return null;
  const s = v.trim();
  if (!s || ['#REF!','#N/A','#VALUE!'].includes(s)) return null;
  if (s.toLowerCase() === 'chiusi') return null;
  let n = s.replace(/€/g,'').replace(/\s/g,'').replace(/\./g,'').replace(',','.');
  n = n.replace(/[^\d.\-]/g,'');
  const f = parseFloat(n);
  return isNaN(f) ? null : f;
}

function fe(v) { if (v==null) return '—'; return '€\u00a0'+Math.round(v).toLocaleString('it-IT'); }
function fe2(v) { if (v==null) return '—'; return '€\u00a0'+v.toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fn(v) { if (v==null) return '—'; return Math.round(v).toLocaleString('it-IT'); }
function ds(v,fmt) { if (v==null) return '—'; return (v>=0?'▲ +':'▼ ')+fmt(Math.abs(v)); }
function dc(v) { return v==null?'':v>=0?'dp':'dn'; }

async function caricaDati() {
  const btn = document.getElementById('btnRefresh');
  btn.classList.add('loading');
  try {
    const res = await fetch(CSV_URL + '&nocache=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    renderDashboard(parseCSV(await res.text()));
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    document.getElementById('contenuto').innerHTML =
      '<div class="error-msg"><strong>Impossibile caricare i dati.</strong><br>'+e.message+'</div>';
  }
  btn.classList.remove('loading');
}

function renderDashboard(rows) {
  const SKIP = ['','data','nel 2025','totale'];
  const giorni = [];
  let tot25=0,tot26=0,cop25t=0,cop26t=0,ost25t=0,ost26t=0;

  for (let i=8; i<rows.length; i++) {
    const r = rows[i];
    if (!r||r.length<5) continue;
    const rawData = (r[1]||'').trim();
    if (!rawData) continue;
    const rd = rawData.toLowerCase();
    if (SKIP.some(s=>s&&rd.startsWith(s))) continue;
    const chiusi = rd.includes('chiusi')||(r[3]||'').toLowerCase().includes('chiusi');
    const inc25=num(r[3]),inc26=num(r[4]),cop25=num(r[11]),cop26=num(r[12]);
    const sc25=num(r[19]),sc26=num(r[20]),ost25=num(r[22]),ost26=num(r[23]);
    giorni.push({data:rawData,chiusi,inc25,inc26,cop25,cop26,sc25,sc26,ost25,ost26,
      diffInc:(inc25!=null&&inc26!=null)?inc26-inc25:null,
      diffCop:(cop25!=null&&cop26!=null)?cop26-cop25:null});
    if (inc26!=null){tot26+=inc26;if(inc25!=null)tot25+=inc25;}
    if (cop26!=null){cop26t+=cop26;if(cop25!=null)cop25t+=cop25;}
    if (ost26!=null&&ost26>0){ost26t+=ost26;if(ost25!=null)ost25t+=ost25;}
  }

  const dTot=tot26-tot25, dCop=cop26t-cop25t, dOst=ost26t-ost25t;
  const sc26m=cop26t>0?tot26/cop26t:null, sc25m=cop25t>0?tot25/cop25t:null;
  const dSc=(sc26m!=null&&sc25m!=null)?sc26m-sc25m:null;
  const giorniAp = giorni.filter(g=>g.inc26!=null&&!g.chiusi).length;
  document.getElementById('giorni-count').textContent = giorniAp+' giorni con dati';

  charts.forEach(c=>c.destroy()); charts=[];

  const C25='#96281b',C26='#1a7a4a',gCol='rgba(0,0,0,0.06)',tCol='#7a7570';
  const gG = giorni.filter(g=>!g.chiusi&&g.inc26!=null);
  const labG = gG.map(g=>g.data.replace(/^(lun|mar|mer|gio|ven|sab|dom)\s+/i,'').replace('/26','').trim());
  const leg = `<div class="legend"><span><span class="ldot" style="background:${C25}"></span>2025</span><span><span class="ldot" style="background:${C26}"></span>2026</span></div>`;
  const sX={ticks:{color:tCol,font:{size:9},autoSkip:false,maxRotation:45},grid:{color:gCol}};
  const sYe={ticks:{color:tCol,font:{size:9},callback:v=>'€'+Math.round(v/1000)+'k'},grid:{color:gCol}};
  const sYn={ticks:{color:tCol,font:{size:9}},grid:{color:gCol}};

  // Tabella solo giorni 2026
  const righe2026 = giorni.filter(g=>g.inc26!=null);
  const tabellaHtml = righe2026.map(g=>
    `<tr>
      <td>${g.data.replace(/^(lun|mar|mer|gio|ven|sab|dom)\s+/i,'').replace('/26','')}</td>
      <td>${fe(g.inc25)}</td><td>${fe(g.inc26)}</td>
      <td class="${dc(g.diffInc)}">${ds(g.diffInc,fe)}</td>
      <td>${fn(g.cop26)}</td>
      <td>${fe2(g.sc26)}</td>
    </tr>`).join('') +
    `<tr class="tot">
      <td>Totale</td>
      <td>${fe(tot25)}</td><td>${fe(tot26)}</td>
      <td class="${dc(dTot)}">${ds(dTot,fe)}</td>
      <td>${fn(cop26t)}</td>
      <td>${fe2(sc26m)}</td>
    </tr>`;

  document.getElementById('contenuto').innerHTML = `
    <div class="nota">⚠️ Confronto sulla stessa finestra temporale (solo giorni con dati 2026).</div>

    <div class="sez">Riepilogo progressivo</div>
    <div class="kpi-grid">
      <div class="kpi ${dTot>=0?'highlight':''}">
        <div class="kpi-label">Incassi 2026</div>
        <div class="kpi-value">${fe(tot26)}</div>
        <div class="kpi-diff ${dTot>=0?'pos':'neg'}">${ds(dTot,fe)} vs 2025</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Incassi 2025</div>
        <div class="kpi-value">${fe(tot25)}</div>
        <div class="kpi-diff neu">stesso periodo</div>
      </div>
      <div class="kpi ${dCop>=0?'highlight':''}">
        <div class="kpi-label">Coperti 2026</div>
        <div class="kpi-value">${fn(cop26t)}</div>
        <div class="kpi-diff ${dCop>=0?'pos':'neg'}">${ds(dCop,fn)} vs 2025</div>
      </div>
      <div class="kpi ${dSc!=null&&dSc>=0?'highlight':''}">
        <div class="kpi-label">Scontrino medio</div>
        <div class="kpi-value">${fe2(sc26m)}</div>
        <div class="kpi-diff ${dSc!=null&&dSc>=0?'pos':'neg'}">${ds(dSc,fe2)} vs 2025</div>
      </div>
      <div class="kpi wide ${dOst>=0?'highlight':''}">
        <div class="kpi-label">Osteria 2026</div>
        <div class="kpi-value">${fe(ost26t)}</div>
        <div class="kpi-diff ${dOst>=0?'pos':'neg'}">${ds(dOst,fe)} vs 2025</div>
      </div>
    </div>

    <div class="sez">Incassi giornalieri</div>
    <div class="chart-card">${leg}<div style="position:relative;height:200px"><canvas id="ch1"></canvas></div></div>

    <div class="sez">Coperti giornalieri</div>
    <div class="chart-card">${leg}<div style="position:relative;height:180px"><canvas id="ch2"></canvas></div></div>

    <div class="sez">Scontrino medio</div>
    <div class="chart-card">${leg}<div style="position:relative;height:170px"><canvas id="ch3"></canvas></div></div>

    <div class="sez">Dettaglio</div>
    <button class="tabella-toggle" id="tgl-btn" onclick="toggleTabella()">
      <span>Tabella giornaliera</span><span class="arrow">▼</span>
    </button>
    <div class="tabella-wrap" id="tgl-wrap">
      <table>
        <thead><tr>
          <th>Giorno</th><th>Inc 25</th><th>Inc 26</th><th>Diff</th><th>Cop 26</th><th>Sco 26</th>
        </tr></thead>
        <tbody>${tabellaHtml}</tbody>
      </table>
    </div>`;

  function mkBar(id,d25,d26,sy){
    const c=new Chart(document.getElementById(id),{type:'bar',data:{labels:labG,datasets:[
      {label:'2025',data:d25,backgroundColor:C25+'aa',borderColor:C25,borderWidth:1.5,borderRadius:3},
      {label:'2026',data:d26,backgroundColor:C26+'aa',borderColor:C26,borderWidth:1.5,borderRadius:3}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:sX,y:sy}}});
    charts.push(c);
  }
  mkBar('ch1',gG.map(g=>g.inc25),gG.map(g=>g.inc26),sYe);
  mkBar('ch2',gG.map(g=>g.cop25),gG.map(g=>g.cop26),sYn);
  const c3=new Chart(document.getElementById('ch3'),{type:'line',data:{labels:labG,datasets:[
    {label:'2025',data:gG.map(g=>g.sc25),borderColor:C25,backgroundColor:'transparent',pointRadius:4,tension:0.3},
    {label:'2026',data:gG.map(g=>g.sc26),borderColor:C26,backgroundColor:'transparent',pointRadius:4,borderDash:[5,3],tension:0.3}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
    scales:{x:sX,y:{ticks:{color:tCol,font:{size:9},callback:v=>'€'+v.toFixed(0)},grid:{color:gCol}}}}});
  charts.push(c3);
}

function toggleTabella() {
  const btn = document.getElementById('tgl-btn');
  const wrap = document.getElementById('tgl-wrap');
  btn.classList.toggle('open');
  wrap.classList.toggle('open');
}

caricaDati();
</script>
</body>
</html>
